name: publish

# Builds and pushes ghcr.io/mathielo/homelab-kiosk:X.Y.Z. Two entry points:
#
#  1. workflow_call  — invoked by release.yml right after it creates the tag
#     and the GitHub Release (the normal path; see release.yml).
#  2. push of a v* tag — for a tag pushed by a human from their machine.
#     Note: a tag pushed by release.yml's GITHUB_TOKEN does NOT re-trigger
#     this (GitHub suppresses token-pushed events) — which is exactly why
#     release.yml calls this workflow directly instead of relying on the tag.
#
# The homelab repo pins a specific X.Y.Z tag and Renovate tracks it.
on:
  workflow_call:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true
        type: string

env:
  IMAGE: ghcr.io/mathielo/homelab-kiosk

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          # On workflow_call `inputs.tag` sets the version explicitly; on a tag
          # push `value` is empty and semver is read from the pushed git ref.
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag }}
            type=sha

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # Cluster nodes are all amd64 — single-arch keeps the build fast.
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
